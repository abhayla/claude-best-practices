name: Sync to Projects
on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'stacks/**'
      - 'registry/patterns.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Sync to registered projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. python scripts/sync_to_projects.py --all
