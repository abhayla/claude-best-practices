name: Scan Projects
on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:
    inputs:
      repo:
        description: 'Specific repo to scan (owner/repo)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.repo }}" ]; then
            PYTHONPATH=. python scripts/collate.py --repo "${{ inputs.repo }}"
          else
            PYTHONPATH=. python scripts/collate.py --all
          fi
      - name: Create PR if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="auto/scan-projects-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore: update patterns from project scan"
            git push origin "$BRANCH"
            gh pr create --title "Update patterns from project scan" \
              --body "Auto-generated by scan-projects workflow." \
              --label "auto-scan,project-source"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
