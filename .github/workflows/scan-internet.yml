name: Scan Internet
on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC
  workflow_dispatch:
    inputs:
      url:
        description: 'Specific URL to scan'
        required: false
        type: string
      topic:
        description: 'Topic to search for'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Run scan
        run: |
          if [ -n "${{ inputs.url }}" ]; then
            PYTHONPATH=. python scripts/scan_web.py --url "${{ inputs.url }}"
          elif [ -n "${{ inputs.topic }}" ]; then
            PYTHONPATH=. python scripts/scan_web.py --topic "${{ inputs.topic }}"
          else
            PYTHONPATH=. python scripts/scan_web.py --all
          fi
      - name: Create PR if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="auto/scan-internet-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore: update patterns from internet scan"
            git push origin "$BRANCH"
            gh pr create --title "Update patterns from internet scan" \
              --body "Auto-generated by scan-internet workflow." \
              --label "auto-scan,internet-source"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
