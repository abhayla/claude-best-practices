name: Aggregate Telemetry
on:
  schedule:
    - cron: '0 9 * * 5'  # Friday 9am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Aggregate telemetry from enrolled repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PYTHONPATH=. python scripts/aggregate_telemetry.py \
            --registry registry/patterns.json \
            --config config/repos.yml \
            --output config/telemetry-aggregates.json
      - name: Create PR if registry updated
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="auto/telemetry-$(date +%Y%m%d)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Skip if a PR already exists for this branch
            EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              echo "PR #$EXISTING already exists for $BRANCH — skipping"
              exit 0
            fi
            git checkout -b "$BRANCH"
            git add registry/patterns.json config/telemetry-aggregates.json
            git commit -m "chore: update pattern effectiveness telemetry"
            git push origin "$BRANCH"
            gh pr create --title "Update pattern effectiveness telemetry" \
              --body "Auto-generated by aggregate-telemetry workflow. Updates adoption rates, retention days, and error prevention rates from enrolled projects." \
              --label "auto-telemetry"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
