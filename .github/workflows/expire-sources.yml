name: Check Source Freshness
on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Check freshness
        run: PYTHONPATH=. python scripts/check_freshness.py
        continue-on-error: true
      - name: Create issue if expired
        if: failure()
        run: |
          gh issue create --title "Expired internet sources detected" \
            --body "Some internet sources have expired. Run \`/scan-url\` to refresh." \
            --label "maintenance"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
