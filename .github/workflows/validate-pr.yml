name: Validate PR
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Validate registry
        run: PYTHONPATH=. python scripts/dedup_check.py --validate-all
      - name: Secret scan
        run: PYTHONPATH=. python scripts/dedup_check.py --secret-scan
      - name: Validate pattern quality
        run: PYTHONPATH=. python scripts/validate_patterns.py
      - name: Run tests
        run: PYTHONPATH=. python -m pytest scripts/tests/ -v
