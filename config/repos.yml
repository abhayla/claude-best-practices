# Registered project repos to scan for patterns
#
# Fields:
#   repo:               GitHub owner/name (required)
#   stacks:             List of stack names for prefix filtering (required)
#   auto_sync:          Push hub pattern updates via PR (default: false)
#   share_synthesized:  Hub-side opt-in to scan this repo's synthesized patterns
#                       via /synthesize-hub. Requires BOTH this flag AND the
#                       project's .claude/synthesis-config.yml allow_hub_sharing: true.
#                       Either side can veto independently. (default: false)
repos:
  - repo: abhayla/KKB
    stacks: [android-compose, fastapi-python, ai-gemini, firebase-auth]
    auto_sync: true
    share_synthesized: true
  - repo: abhayla/AlgoChanakya
    stacks: [fastapi-python, ai-gemini, vue-nuxt]
    auto_sync: true
    share_synthesized: true
  - repo: abhayla/IPODhan
    stacks: [react-nextjs]
    auto_sync: true
    share_synthesized: false  # IPODhan synthesis-config allow_hub_sharing: false (local-only)
  - repo: abhayla/RealFuelPricesinIndia
    stacks: [react-nextjs]  # Next.js + Supabase + Playwright/Vitest; scraper/pipeline Node/TS backend
    auto_sync: true
    share_synthesized: false  # default local-only until the project opts in via synthesis-config
  - repo: abhayla/calculatekaro
    stacks: [react]  # Vite + React + TS + Vitest; static SPA (CalculateKaro multi-calculator hub) — dogfood
    auto_sync: false  # private dogfood app; pull hub patterns manually for now
    share_synthesized: true  # opted in to share synthesized patterns back (bilateral; project synthesis-config must also allow)
