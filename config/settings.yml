# Global settings for the best practices hub
scan:
  project_schedule: "0 9 * * 1"
  internet_schedule: "0 10 * * 1"
  expire_schedule: "0 8 * * 1"

limits:
  max_prs_per_scan: 5
  max_urls_per_scan: 20
  max_semantic_comparisons: 50
  claude_api_monthly_budget_usd: 5.0

pr:
  labels_project: ["auto-scan", "project-source"]
  labels_internet: ["auto-scan", "internet-source"]
  labels_contribution: ["contribution"]
  labels_sync: ["best-practices", "auto-sync"]

dedup:
  semantic_threshold_strong: 85
  semantic_threshold_weak: 70
  structural_threshold: 3

synthesis:
  max_conventions: 20
  # Gold standard patterns used as few-shot examples during /synthesize-project.
  # Criteria: follows all structure standards, 100-300 lines, demonstrates
  # project-specific language (not generic advice), includes clear "why" reasoning.
  gold_standards:
    rules:
      - pattern-structure        # Universal rule — shows required frontmatter, scope, versioning
      - fastapi-backend          # Stack-specific rule — shows how to be project-specific
    skills:
      - tdd                      # Workflow type — shows numbered steps, critical rules section
      - test-knowledge           # Reference type — shows organized sections without step numbering
    agents:
      - code-reviewer-agent       # Shows agent structure: model, core responsibilities, output format

clustering:
  min_cluster_size: 3
