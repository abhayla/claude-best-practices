# Documentation Structure Configuration
# Generated by /doc-structure-enforcer on first run.
# Edit this file to customize folder layout and classification rules.
# Run `/doc-structure-enforcer --audit` to check compliance.
# Run `/doc-structure-enforcer --enforce` to move misplaced files.

doc_root: docs

structure:
  # === Standalone Doc Folders ===
  - path: docs/api
    description: "API docs (OpenAPI specs, endpoint references)"
    patterns:
      - "**/openapi*.yml"
      - "**/openapi*.yaml"
      - "**/openapi*.json"
      - "**/swagger*.yml"
      - "**/api-reference*.md"
      - "**/endpoints*.md"
    content_signals:
      - "openapi:"
      - "swagger:"
      - "## Endpoints"
      - "## API Reference"

  - path: docs/architecture
    description: "Architecture & design docs, system diagrams"
    patterns:
      - "**/ARCHITECTURE*.md"
      - "**/architecture*.md"
      - "**/design-*.md"
      - "**/system-design*.md"
    content_signals:
      - "## Architecture"
      - "## System Design"
      - "## High-Level Design"
      - "C4 model"

  # === Pipeline Stage 1: PRD ===
  - path: docs/stages/stage-1-prd/input
    description: "Raw requirements, issue URLs, stakeholder notes"
    patterns: []

  - path: docs/stages/stage-1-prd/output
    description: "Finalized PRD"
    patterns:
      - "**/*-prd.md"
      - "**/*-prd-*.md"
      - "**/PRD*.md"
    content_signals:
      - "## Product Requirements"
      - "## User Stories"
      - "## Acceptance Criteria"

  # === Pipeline Stage 2: Plan ===
  - path: docs/stages/stage-2-plan/input
    description: "PRD from stage 1"
    patterns: []

  - path: docs/stages/stage-2-plan/output
    description: "Implementation plan, ADRs (from /adr skill)"
    patterns:
      - "**/*-plan.md"
      - "**/*-plan-*.md"
      - "**/ADR-*.md"
      - "**/[0-9][0-9][0-9][0-9]-*.md"
    content_signals:
      - "## Implementation Plan"
      - "## Task Breakdown"
      - "Status: Accepted"
      - "## Decision"
      - "## Consequences"

  # === Pipeline Stage 3: Scaffold ===
  - path: docs/stages/stage-3-scaffold/input
    description: "PRD and plan references"
    patterns: []

  - path: docs/stages/stage-3-scaffold/output
    description: "Scaffold documentation"
    patterns:
      - "**/*-scaffold*.md"
      - "**/project-structure*.md"
    content_signals:
      - "## Project Structure"
      - "## Directory Layout"

  # === Pipeline Stage 4: HTML Demo ===
  - path: docs/stages/stage-4-demo/input
    description: "PRD and scaffold references"
    patterns: []

  - path: docs/stages/stage-4-demo/output
    description: "Screenshots, implementation mapping"
    patterns:
      - "**/IMPL-MAPPING*.md"
      - "**/demo-*.md"
      - "**/screenshots/**"
    content_signals:
      - "## Implementation Mapping"
      - "## Screen Inventory"

  # === Pipeline Stage 5: Schema ===
  - path: docs/stages/stage-5-schema/input
    description: "Plan and scaffold references"
    patterns: []

  - path: docs/stages/stage-5-schema/output
    description: "ERD, database schema docs, migration guides"
    patterns:
      - "**/erd*.md"
      - "**/schema*.md"
      - "**/migration-guide*.md"
    content_signals:
      - "## Entity Relationship"
      - "## Database Schema"
      - "## Migrations"

  # === Pipeline Stage 6: Pre-Implementation Tests ===
  - path: docs/stages/stage-6-pre-tests/input
    description: "Plan and schema references"
    patterns: []

  - path: docs/stages/stage-6-pre-tests/output
    description: "Test matrix, test plan"
    patterns:
      - "**/test-matrix*.md"
      - "**/pre-impl-test*.md"
    content_signals:
      - "## Test Matrix"
      - "## Test Plan"
      - "## Pre-Implementation Tests"

  # === Pipeline Stage 7: Implementation ===
  - path: docs/stages/stage-7-impl/input
    description: "Plan, tests, schema references"
    patterns: []

  - path: docs/stages/stage-7-impl/output
    description: "Implementation progress tracking"
    patterns:
      - "**/*-progress*.md"
      - "**/impl-status*.md"
    content_signals:
      - "## Implementation Progress"
      - "## Task Status"

  # === Pipeline Stage 8: Post-Implementation Tests ===
  - path: docs/stages/stage-8-post-tests/input
    description: "Implementation artifacts"
    patterns: []

  - path: docs/stages/stage-8-post-tests/output
    description: "E2E report, performance, security assessment"
    patterns:
      - "**/e2e-report*.md"
      - "**/perf-report*.md"
      - "**/security-report*.md"
      - "**/threat-model*.md"
    content_signals:
      - "## E2E Test Results"
      - "## Performance Report"
      - "## Security Assessment"
      - "## Threat Model"

  # === Pipeline Stage 9: Code Review ===
  - path: docs/stages/stage-9-review/input
    description: "Test results, implementation artifacts"
    patterns: []

  - path: docs/stages/stage-9-review/output
    description: "Code review report"
    patterns:
      - "**/review-report*.md"
      - "**/code-review*.md"
    content_signals:
      - "## Code Review"
      - "## Review Summary"

  # === Pipeline Stage 10: Deploy ===
  - path: docs/stages/stage-10-deploy/input
    description: "Review approval, source artifacts"
    patterns: []

  - path: docs/stages/stage-10-deploy/output
    description: "Runbooks, DR plan, deploy guides"
    patterns:
      - "**/runbook*.md"
      - "**/DR-RUNBOOK*.md"
      - "**/deploy-guide*.md"
    content_signals:
      - "## Runbook"
      - "## Disaster Recovery"
      - "## Deploy"
      - "## SLO"

  # === Pipeline Stage 11: Docs & Handover ===
  - path: docs/stages/stage-11-docs/input
    description: "All prior stage outputs"
    patterns: []

  - path: docs/stages/stage-11-docs/output
    description: "Final architecture doc, handover, pipeline summary"
    patterns:
      - "**/handover*.md"
      - "**/HANDOVER*.md"
      - "**/project-summary*.md"
    content_signals:
      - "## Handover"
      - "## Project Summary"
      - "## Final Documentation"

# Files and folders to ignore during audit (never classify or move)
ignore:
  - "**/node_modules/**"
  - "**/vendor/**"
  - "**/.git/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "**/__pycache__/**"

# Docs allowed at project root (not inside docs/)
root_docs:
  allowed:
    - README.md
    - CLAUDE.md
    - CLAUDE.local.md
    - CHANGELOG.md
    - CONTRIBUTING.md
    - LICENSE*
    - CODE_OF_CONDUCT*

# Auto-generated docs managed by scripts (skip enforcement)
generated:
  - docs/DASHBOARD.md
  - docs/STACK-CATALOG.md
  - docs/GETTING-STARTED.md
  - docs/dashboard.html

# Cross-cutting navigation index (auto-generated by this skill)
index_file: docs/index.md
