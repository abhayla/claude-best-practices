# Test pipeline configuration — three-lane model, skill-at-T0 orchestrator
#
# Read by:
#   - /test-pipeline (skill-at-T0, spec v2.2) — full orchestrator lifecycle
#   - /e2e-visual-run (skill-at-T0) — lanes.ui.* keys only (baselines, use_checkpoint)
#   - test-scout-agent / tester-agent / fastapi-api-tester-agent /
#     visual-inspector-agent / test-failure-analyzer-agent /
#     github-issue-manager-agent — per-worker config lookups (auto_heal,
#     track_detection, capture_proof, concurrency caps)
#
# Ships as a default with hub provisioning so downstream projects can
# run /test-pipeline out of the box. Provisioned to
# .claude/config/test-pipeline.yml in target projects. Override any
# value locally without modifying the hub template.
#
# Spec reference: docs/specs/test-pipeline-three-lane-spec-v2.md v2.2 §3.1
# (skill-at-T0 orchestration) — v1.7 spec is SUPERSEDED; v2.2 preserves all
# v1 REQ IDs including the keys used below.

schema_version: "2.0.0"

pipeline:
  name: three-lane-test-pipeline
  version: "2.0.0"

# Lane definitions (closes Reviewer Gap 1 / spec §3.3)
lanes:
  functional:
    enabled: true
    intra_lane_parallelism: auto      # auto | <int> | 1 (off) — delegates to test runner
    capture_proof: true                # functional lane runs UI tests with screenshots
  api:
    enabled: true
    intra_lane_parallelism: auto
    invoke_skills_after_runner:        # API lane runs runner THEN these skills
      - contract-test
      - integration-test
  ui:
    enabled: true
    runs_after: functional             # waits for functional lane to produce screenshots
    intra_lane_parallelism: 1          # multimodal review is sequential per agent
    use_checkpoint: false              # REQ-S006: when true, UI lane starts on functional.ui-tests-complete.flag instead of full functional return (reduces wall-clock on projects with many slow non-UI tests after UI tests)

  # Complexity classifier for Wave 1 parallelism — spec v2.2 §7 Q4 RESOLVED.
  # When enabled, the /test-pipeline skill (at STEP 2 SCOUT) reads
  # scout.test_count and picks Wave 1 topology accordingly:
  #   - test_count >= min_test_count → parallel Wave 1 (functional + api
  #     dispatched in one T0 message; ~2x throughput)
  #   - test_count < min_test_count → serial Wave 1 (functional fully,
  #     then api; avoids fan-out overhead for small suites)
  # Disabling the flag forces parallel Wave 1 regardless of size
  # (pre-spec-v2.2 default behavior).
  #
  # Rationale: fan-out overhead (dispatch setup, contract parsing, state
  # merge) is not worth the wall-clock savings when the suite has fewer
  # tests than the savings threshold. Empirically, 50 tests is the
  # breakeven on typical projects.
  parallel_classifier:
    enabled: true
    min_test_count: 50

# Scout track-detection rules (closes spec §3.1 + reviewer Gap 9)
track_detection:
  api_path_globs:
    - "**/tests/api/**"
    - "**/tests/integration/**"
    - "**/tests/contract/**"
  api_import_signals:
    - httpx
    - requests
    - axios
    - node-fetch
    - supertest
    - pact
    - "@pact-foundation/pact"
  override_file: "core/.claude/config/test-track-overrides.yml"
  detection_mode: accumulate           # ALL rules run; results accumulate (NOT first-match-wins)

# Retry budget — shared pool across all stages
retry:
  global_budget: 15
  per_stage_max_attempts: 3
  per_test_cap: 3                      # max retries per single test
  # The /test-pipeline skill (skill-at-T0) reads `global_budget` at STEP 1 INIT
  # and tracks `global_retries_remaining` in the consolidated state.json
  # (spec v2.2 §3.4, owned by T0). Spec v2.2 dissolves the multi-agent
  # budget-hand-off that existed in v1 — T0 owns the budget directly now.

# Parallel fan-out caps (closes Reviewer Gap 5 / spec §3.8.1)
concurrency:
  max_concurrent_analyzers: 5
  max_concurrent_issue_managers: 5
  max_concurrent_fixers: 5
  # ── Scaffold only (REQ-S007) ──────────────────────────────────────────────
  # Weighted dispatch counter. null → each Agent() call counts as 1 toward
  # budget.max_total_dispatches (current behavior, unchanged). When set to a
  # mapping, the pipeline multiplies each dispatch by its weight before
  # counting (e.g., `{fixer: 5, analyzer: 1, issue_manager: 1}`). Activate
  # only when production runs trip `max_total_dispatches` while
  # `max_wall_clock_minutes` still has plenty remaining (TRADE-OFF-1 in
  # spec §5). Leaving null keeps today's uniform accounting.
  # spec_ref: REQ-S007
  dispatch_weights: null

# Measurable budget enforcement (NOT token-based — Claude Code doesn't expose tokens_used)
budget:
  max_total_dispatches: 100            # hard cap on total Agent() calls per pipeline run
  max_wall_clock_minutes: 90           # pipeline-wide timeout budget
  warn_at_dispatch_pct: 0.75           # emit warning at 75% consumption
  # ── Scaffold only (REQ-S008) ──────────────────────────────────────────────
  # Per-phase wall-clock timeouts. Both null → only the pipeline-wide
  # `max_wall_clock_minutes` applies (current behavior). Set a positive
  # integer to cap an individual phase independently; on exceed, that phase
  # aborts with a structured BLOCKED contract and the pipeline proceeds to
  # the next phase (so a stuck lane can't starve triage). Activate only
  # when slow-CI users report triage starvation (TRADE-OFF-2 in spec §5).
  # spec_ref: REQ-S008
  max_lane_minutes: null               # cap per lane (functional, api, ui)
  max_triage_minutes: null             # cap for T2B triage phase

# Screenshot-capture policy for UI tests
capture_proof:
  enabled: true
  # When enabled:
  # - UI tests capture screenshots on every run (pass and fail)
  # - Non-UI tests capture only on failure (supplementary evidence)
  # Override with --no-capture-proof on the CLI.

# Contradiction handling when multiple skills produce disagreeing verdicts
# - warn: surface in report, don't block (default for test-pipeline)
# - block: escalate to FAILED
contradictions:
  action: warn

# Per-category auto-heal matrix — read by test-failure-analyzer-agent at dispatch
# time to map each classified category to a recommended_action. Override any
# entry in the downstream project's .claude/config/test-pipeline.yml to tune
# auto-heal behavior per codebase. Allowed values: AUTO_HEAL,
# AUTO_HEAL_WITH_FLAG, ISSUE_ONLY, QUARANTINE, RETRY_INFRA.
# spec_ref: REQ-S004 (config-driven matrix)
auto_heal:
  # Keys MUST match analyzer's `category` output field exactly — the analyzer
  # looks up auto_heal[category] at dispatch time (see test-failure-analyzer-
  # agent.md §Stage 3). Mismatch → fallback to ISSUE_ONLY (verified 2026-04-24
  # in v2-pipeline-testbed: TIMEOUT_TIMING key did not match TIMEOUT category).
  SELECTOR: AUTO_HEAL
  TIMEOUT: AUTO_HEAL
  ASSERTION_FAILURE: AUTO_HEAL
  MISSING_IMPORT: AUTO_HEAL
  FIXTURE_MISMATCH: AUTO_HEAL
  SCHEMA_MISMATCH: AUTO_HEAL                        # API category (PR1 REQ-M034)
  BASELINE_DRIFT_INTENTIONAL: AUTO_HEAL_WITH_FLAG   # only when /test-pipeline --update-baselines is passed (REQ-S002)
  FLAKY_TEST: QUARANTINE
  INFRASTRUCTURE: RETRY_INFRA
  LOGIC_BUG: ISSUE_ONLY
  STATUS_CODE_DRIFT: ISSUE_ONLY                     # API category (PR1 REQ-M034)
  CONTRACT_BROKEN: ISSUE_ONLY                       # API category (PR1 REQ-M034)
  VISUAL_REGRESSION: ISSUE_ONLY
  NEEDS_CONTRACT_VALIDATION: ISSUE_ONLY             # API category (PR1 REQ-M034)

# Optional CLI flags supported by /test-pipeline (REQ-S001, S002, S005)
cli_flags:
  only_issues:
    description: "Re-run pipeline against only the tests linked to the given GitHub Issue numbers. Comma-separated list."
    example: "/test-pipeline --only-issues 1234,1235,1236"
    spec_ref: "REQ-S001"
  update_baselines:
    description: "Allow healer to auto-regen visual baselines for BASELINE_DRIFT_INTENTIONAL category."
    example: "/test-pipeline --update-baselines"
    spec_ref: "REQ-S002"
  autosquash:
    description: "After successful run with multiple fix commits, consolidate via git rebase -i --autosquash."
    example: "/test-pipeline --autosquash"
    spec_ref: "REQ-S005"
  fix_pr_mode:
    description: "Land all fixer diffs on a new branch pipeline-fixes/{run_id} and open ONE PR (vs N commits on working branch). Never auto-merges."
    example: "/test-pipeline --fix-pr-mode"
    spec_ref: "REQ-C003"

# GitHub Issue creation config (active in PR2 — declared here for forward-compat)
issue_creation:
  enabled: true                        # set false to disable Issue creation entirely
  preflight_required: true             # MUST be true to honor "no silent skip"
  dedup_window_days: 30
  dedup_hash_fields: ["test_id", "category", "failing_commit_sha_short"]   # 3-field hash (PR2)
  labels_default:
    - pipeline-failure
  comment_on_dedup: true               # if dedup hits, append comment with new run_id
  partial_failure_policy: abort_on_first_blocked   # /test-pipeline STEP 6 TRIAGE Fan-out 2 fan-in policy (spec v2.2 §3.3)

# Re-verification policy (active in PR2)
reverify:
  affected_tests_only: true            # iteration loop runs only affected tests
  final_full_suite_check: true         # after green, run full suite once for collateral regression check

# State file conventions — spec v2.2 §3.4: single consolidated state file at T0
state:
  # master_file is the SINGLE source of truth. Spec v2.2 dissolves v1's
  # three-file layout (master/sub/triage) — workers read their scope via
  # paths in dispatch context and never write directly to state.json; they
  # return structured contracts that T0 merges.
  master_file: ".workflows/testing-pipeline/state.json"
  events_file: ".workflows/testing-pipeline/events.jsonl"    # append-only event log for audit + resume
  results_dir: "test-results"
  evidence_dir: "test-evidence"
  fixes_dir: "test-results/fixes"      # diff staging dir for /serialize-fixes
  schema_compatibility:
    minimum_required: "2.0.0"
    on_mismatch: "abort_with_STATE_SCHEMA_INCOMPATIBLE"
  # Legacy paths — RETAINED here for downstream projects still reading v1
  # state via older workers. /test-pipeline STEP 1 INIT cleans these too
  # (see cleanup list below) so no stale data survives a v1 → v2 cutover.
  legacy_sub_file: ".workflows/testing-pipeline/sub/test-pipeline.json"
  legacy_triage_file: ".workflows/testing-pipeline/sub/failure-triage.json"

# Ephemeral directories wiped at /test-pipeline STEP 1 INIT. The skill-at-T0
# orchestrator owns cleanup (spec v2.2 §3.1 STEP 1 bullet 4) — there is no
# distinct "dispatched mode" in v2.2, only T0.
cleanup_at_init:
  - "test-results/"
  - "test-evidence/"                  # retention: keep the 3 most recent {run_id} subdirs
  - ".pipeline/test-pipeline-state.json"
  - ".workflows/testing-pipeline/sub/"  # v1 sub-state layout — pruned during v1→v2 cutover
